name: Slack Test

on:
  schedule:
    - cron: "*/5 * * * *" # 5分おきに実行
  workflow_dispatch: # 手動実行用

jobs:
  slack-hello:
    runs-on: ubuntu-latest
    steps:
      - name: Send hello to Slack
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"text": "hello"}'
