name: Daily Health Report

on:
  schedule:
    - cron: "0 22 * * *"    # UTC 22:00 = JST 07:00（朝の睡眠レポート）
    - cron: "0 12 * * *"    # UTC 12:00 = JST 21:00（夜のアクティビティレポート）
  workflow_dispatch:
    inputs:
      mode:
        description: "Report mode"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - evening

jobs:
  morning-report:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning' || github.event_name == 'schedule' && github.event.schedule == '0 22 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run morning report (sleep data)
        env:
          FITBIT_CLIENT_ID: ${{ vars.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
          FITBIT_REFRESH_TOKEN: ${{ secrets.FITBIT_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_ID: ${{ vars.SLACK_USER_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO_OWNER: ${{ github.repository_owner }}
          GH_REPO_NAME: ${{ github.event.repository.name }}
        run: python main.py --mode morning

  evening-report:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'evening' || github.event_name == 'schedule' && github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evening report (activity data)
        env:
          FITBIT_CLIENT_ID: ${{ vars.FITBIT_CLIENT_ID }}
          FITBIT_CLIENT_SECRET: ${{ secrets.FITBIT_CLIENT_SECRET }}
          FITBIT_REFRESH_TOKEN: ${{ secrets.FITBIT_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USER_ID: ${{ vars.SLACK_USER_ID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO_OWNER: ${{ github.repository_owner }}
          GH_REPO_NAME: ${{ github.event.repository.name }}
        run: python main.py --mode evening

